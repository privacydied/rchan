# rchan front router — one localhost port (8081), split by Host header.
# DSM terminates TLS and forwards BOTH rchan.xyz and boards.rchan.xyz here on the
# same port, so DSM never has to fan out to different backend ports.
#
#   rchan.xyz         -> 301 redirect to the canonical board host
#   boards.rchan.xyz  -> LynxChan engine (lynxchan:8080, internal Docker network)

# WebSocket upgrade plumbing (harmless; LynxChan's live socket is a separate port).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Preserve the real scheme DSM saw at the edge (https). DSM sets
# X-Forwarded-Proto; if absent (e.g. local curl) fall back to our own scheme.
map $http_x_forwarded_proto $rchan_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# CORS allow-list for the rchan.xyz homepage. Its enhancement strips (active
# threads, site presence) fetch these PUBLIC JSON endpoints, but the homepage is
# a different origin (rchan.xyz) than the board host, so the reads are cross-
# origin. Allow exactly those paths — nothing else gets a CORS header (empty
# value = header omitted). $uri is the normalized path, query stripped.
map $uri $rchan_cors {
    default                      "";
    "/boards.js"                 "*";   # board list (buildActiveThreads)
    "/addon.js/presence"         "*";   # "N anons browsing" (site presence)
    "~^/[^/.]+/catalog\.json$"   "*";   # per-board catalog (active-threads strip)
}

# ---- SEO: canonical URL for every HTML page --------------------------------
# Injected as <link rel="canonical"> just before </head> (sub_filter, boards
# block). Rules, most-specific first (map: exact strings beat regexes, regexes
# match in order):
#   • the homepage canonicalizes to the APEX host — rchan.xyz/ and
#     boards.rchan.xyz/ serve the same page, and the brand apex is the one
#     canonical home (the engine renders "/" as /index.html internally, so
#     both spellings are pinned);
#   • a board's bare index (/gen/) canonicalizes to its catalog — that IS the
#     board's landing view here (the router 302s exactly that way), so search
#     engines consolidate onto the URL users actually land on. The overboard
#     has no catalog and stays itself;
#   • any /…/index.html collapses to its directory;
#   • .html is stripped (clean URLs are the only spelling we link, and .html
#     requests 301 to clean below — the tag and the redirect must agree);
#   • everything else is itself, on the boards host.
# $uri is the REWRITTEN uri (clean /gen/res/35 becomes /gen/res/35.html before
# proxying), so the .html-stripping rule normalizes both request spellings to
# one canonical. Query strings are deliberately excluded ($uri has none): view
# toggles like /gen/?index must not mint their own canonical.
map $uri $rchan_canon {
    default                          "https://boards.rchan.xyz$uri";
    "/"                              "https://rchan.xyz/";
    "/index.html"                    "https://rchan.xyz/";
    "/overboard/"                    "https://boards.rchan.xyz/overboard/";
    # Board-URI character class matches the actual board-index redirect
    # (below, "^/(?!overboard/)[^/.]+/$") -- was narrower ([a-z0-9]+ only),
    # so a board URI with e.g. an underscore would still 302 bare-index ->
    # catalog per that redirect, but silently fall through to the generic
    # default rule here instead of canonicalizing the same way. (No need to
    # exclude overboard/ explicitly: the exact-string "/overboard/" entry
    # above always wins over this regex regardless of order — nginx map
    # matches exact strings before regexes.)
    "~^(?<cb>/[^/.]+)/$"             "https://boards.rchan.xyz$cb/catalog";
    "~^(?<cp>.*)/index\.html$"       "https://boards.rchan.xyz$cp/";
    "~^(?<ch>.+)\.html$"             "https://boards.rchan.xyz$ch";
}

# ---- SEO: noindex for utility/mod surfaces ----------------------------------
# Emitted as X-Robots-Tag (empty value = header omitted). robots.txt already
# DISALLOWS these, but disallow only stops crawling — a disallowed URL can
# still be indexed from links; noindex is what actually keeps it out. These
# are account/login/moderation/captcha pages and machine endpoints: no search
# value, some leak UI that varies by session.
map $uri $rchan_noindex {
    default                       "";
    "~^/login(\.html)?$"          "noindex, nofollow";
    "~^/account"                  "noindex, nofollow";
    "~^/accounts"                 "noindex, nofollow";
    "~^/openReports"              "noindex, nofollow";
    "~^/closedReports"            "noindex, nofollow";
    "~^/globalManagement"         "noindex, nofollow";
    "~^/globalSettings"           "noindex, nofollow";
    "~^/bans"                     "noindex, nofollow";
    "~^/bannerManagement"         "noindex, nofollow";
    "~^/rangeBans"                "noindex, nofollow";
    "~^/hashBans"                 "noindex, nofollow";
    "~^/asnBans"                  "noindex, nofollow";
    "~^/appealedBans"             "noindex, nofollow";
    "~^/filterManagement"         "noindex, nofollow";
    "~^/mediaManagement"          "noindex, nofollow";
    "~^/customThumbs"             "noindex, nofollow";
    "~^/trashBin"                 "noindex, nofollow";
    "~^/archives"                 "noindex, nofollow";
    "~^/latestPostings"           "noindex, nofollow";
    "~^/logs"                     "noindex, nofollow";
    "~^/graphs"                   "noindex, nofollow";
    "~^/languages"                "noindex, nofollow";
    "~^/socketControl"            "noindex, nofollow";
    "~^/noCookieCaptcha"          "noindex, nofollow";
    "~^/captcha"                  "noindex, nofollow";
    "~\.json$"                    "noindex";
}

# ---- rchan.xyz (apex) : LynxChan's own front page at "/", everything else -> board host ----
# The root path shows the SAME homepage LynxChan serves at boards.rchan.xyz/ — it is
# internally proxied to our own boards vhost (Host header spoofed) so every style/script
# injection the boards block applies is reused with zero config duplication. There is no
# loop: Host=boards.rchan.xyz matches the boards server block, not this one. Every OTHER
# path (/gen, /gen/res/1.html, assets, …) 301s to boards.rchan.xyz with path + query
# preserved, so the board host stays the one canonical home for all board content — and the
# front page's own board links (/gen/) therefore redirect there when clicked.
# Also the default_server, so bare-IP / unknown Host hits this block too.
# SEO: www is a third hostname serving the same homepage (it rode the apex
# block) — one more duplicate for search engines to reconcile. Collapse it
# onto the apex with a plain 301 so exactly two hosts exist: rchan.xyz (home)
# and boards.rchan.xyz (content).
server {
    listen 80;
    server_name www.rchan.xyz;
    return 301 https://rchan.xyz$request_uri;
}

server {
    listen 80 default_server;
    server_name rchan.xyz _;

    # SEO: the apex serves ONLY the homepage; everything else 301s to the board
    # host, so allow-all is safe (crawling any other apex path just follows the
    # redirect). Points at the boards-host sitemap — cross-host sitemap
    # declarations in robots.txt are valid.
    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600";
        return 200 "User-agent: *\nAllow: /\n\nSitemap: https://boards.rchan.xyz/sitemap.xml\n";
    }

    # homepage: relay the fully-processed board front page
    location = / {
        proxy_pass http://127.0.0.1:80/;
        proxy_http_version 1.1;
        proxy_set_header Host              boards.rchan.xyz;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # Shared engine/UX assets (dot-prefixed: /.static, /.rchan, /.media, /.ws — never
    # board names) are served SAME-ORIGIN here instead of redirected, so the homepage's
    # scripts satisfy its `script-src 'self'` CSP (a 301 to the board host reads as
    # cross-origin and gets blocked, which was killing ux.js and every icon it draws).
    location ~ ^/\. {
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Host              boards.rchan.xyz;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }

    # everything else -> the board host, path + query preserved
    location / {
        return 301 https://boards.rchan.xyz$request_uri;
    }
}

# ---- boards.rchan.xyz : LynxChan engine ----
server {
    listen 80;
    server_name boards.rchan.xyz;

    # SEO: crawl rules for the content host. Content (boards, catalogs,
    # threads, media) is fully crawlable — media deliberately so, image search
    # is real discovery traffic. Disallowed: account/login/moderation surfaces,
    # captcha, addon endpoints and the JSON API mirrors (crawl budget noise; the
    # $rchan_noindex header is the enforcement layer — disallow only stops
    # crawling, noindex is what keeps a linked URL out of the index).
    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600";
        return 200 "User-agent: *\nDisallow: /login\nDisallow: /account\nDisallow: /accounts\nDisallow: /openReports\nDisallow: /closedReports\nDisallow: /globalManagement\nDisallow: /globalSettings\nDisallow: /bans\nDisallow: /bannerManagement\nDisallow: /rangeBans\nDisallow: /hashBans\nDisallow: /asnBans\nDisallow: /appealedBans\nDisallow: /filterManagement\nDisallow: /mediaManagement\nDisallow: /customThumbs\nDisallow: /trashBin\nDisallow: /archives\nDisallow: /latestPostings\nDisallow: /logs\nDisallow: /graphs\nDisallow: /languages\nDisallow: /socketControl\nDisallow: /noCookieCaptcha\nDisallow: /captcha.js\nDisallow: /randomBanner.js\nDisallow: /addon.js/\nDisallow: /*.json\n\nSitemap: https://boards.rchan.xyz/sitemap.xml\n";
    }

    # SEO: the live sitemap (sitemap addon: read-only DB projections, 10-min
    # in-addon cache) at the standard path robots.txt advertises.
    location = /sitemap.xml {
        proxy_pass http://lynxchan:8080/addon.js/sitemap;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=600";
    }

    # SEO: IndexNow key file — proves domain ownership to the IndexNow API
    # (Bing/Yandex/Seznam/Naver instant indexing). The key is public by
    # design: the protocol's ownership proof IS serving it at this URL.
    # Submissions POST {host, key, keyLocation, urlList} to api.indexnow.org.
    location = /b0df0ad131c7bcf890cfffaa9d4e60c7cd74207a71702eeb.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=86400";
        return 200 "b0df0ad131c7bcf890cfffaa9d4e60c7cd74207a71702eeb";
    }

    # LynxChan general.json: maxFileSizeMB=32 / maxRequestSizeMB=32. Give headroom.
    client_max_body_size 64m;

    # Compress text responses at the origin. The engine sends HTML plain (which
    # is what lets sub_filter work), and our /.rchan/* assets are aliased files —
    # gzip covers LAN/direct access AND the origin->Cloudflare fetch. Applied
    # AFTER sub_filter, so the injections are unaffected.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/css application/javascript application/json application/manifest+json image/svg+xml text/plain;

    # The clean-URL fallback is a 2-level chain (.html -> .js -> trailing-slash redirect);
    # nginx only follows the second error_page hop when recursive error pages are on.
    recursive_error_pages on;

    # --- proxy defaults (inherited by locations that don't set their own headers) ---
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $rchan_proto;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    # sub_filter needs uncompressed upstream HTML to rewrite links
    proxy_set_header Accept-Encoding   "";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # =========================================================================
    # Clean URLs (cosmetic). Two halves:
    #  1) OUTGOING: strip extensions from links in served HTML (sub_filter, below).
    #  2) INCOMING: map extension-less requests back to the engine's real file via
    #     a .html -> .js -> raw fallback chain (locations, below).
    # .js API endpoints are only ever stripped from href="" (navigation), never
    # from action="" (POST forms) or from JS, so posting/login/moderation stay intact.
    # =========================================================================
    sub_filter_once  off;
    sub_filter_types text/html;

    # Global footer with Rules + Contact links, injected on every page.
    # Also: make the moderation IP (span.labelIp) clickable -> IP geolocation lookup.
    sub_filter '</body>' '<footer style="text-align:center;padding:.9em;margin-top:1em;font-size:.85em;opacity:.85"><a href="/.static/pages/globalRules">Rules</a> &middot; <a href="/.static/pages/contact">Contact</a></footer><style>.labelIp{cursor:pointer;text-decoration:underline dotted}.labelIp:hover{text-decoration:underline}</style><script src="/.rchan/mod.js?v=fa0a5dc7"></script><script src="/.rchan/favicon.js?v=27ed9699"></script><script src="/.rchan/ux.js?v=83e4dc2e"></script></body>';

    # The /.rchan/* enhancement assets below (mod.js, favicon.js, predark.js,
    # ux.css, ux.js) are all injected into HTML with a ?v=<content-hash> token
    # that deploy-fe.sh rewrites from each file's md5 — a changed file gets a new
    # URL, an unchanged one keeps its key. Because the URL itself is the version,
    # these are safe to cache for a year immutable: browsers/Cloudflare never
    # revalidate a given ?v=, and a deploy simply points the (uncached, dynamic)
    # HTML at the new token. The old 30s TTL made the edge re-fetch ~440 KB of
    # JS/CSS every 30 seconds for nothing. HTML is never long-cached, so rollouts
    # stay instant. (sw.js stays no-cache below — the SW must update promptly.)

    # Same-origin script for the mod IP -> geolocation click (inline scripts are blocked
    # by LynxChan's CSP "script-src '\''self'\''", so it must be served from our origin).
    location = /.rchan/mod.js {
        alias /etc/nginx/rchan/mod.js;
        default_type application/javascript;
        charset utf-8;
        charset_types application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Animated-favicon script (pre-split gif frames, embedded).
    location = /.rchan/favicon.js {
        alias /etc/nginx/rchan/favicon.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Pre-paint default-theme script. MUST be a same-origin file, not an inline
    # <script> block -- the engine's CSP is script-src 'self' with no
    # unsafe-inline/nonce/hash exception, so an inline script here is silently
    # blocked by the browser (confirmed: it never ran, for any visitor, the
    # entire time it was inline -- every earlier "fresh visitor" verification
    # this session had manually pre-seeded localStorage first, which masked
    # it). Loaded as a normal blocking <script src> (no async/defer) placed in
    # <head> before <body>, so it still runs before first paint, same as an
    # inline script would -- just CSP-compliant.
    location = /.rchan/predark.js {
        alias /etc/nginx/rchan/predark.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # UX layer: stylesheet + client enhancements (nav buttons, hide, hover-zoom, keys).
    location = /.rchan/ux.css {
        alias /etc/nginx/rchan/ux.css;
        default_type text/css;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location = /.rchan/ux.js {
        alias /etc/nginx/rchan/ux.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    # Per-theme CSS layers, split out of ux.css so their ~30KB each only ships
    # to visitors actually on the theme. URLs are handed to the client via the
    # RCHAN_TCSS map injected in <head> (see the sub_filter below); predark.js
    # loads the active one pre-paint, ensureThemeCss (ux.js) on a live switch.
    location = /.rchan/theme-academia.css {
        alias /etc/nginx/rchan/theme-academia.css;
        default_type text/css;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location = /.rchan/theme-brutalist.css {
        alias /etc/nginx/rchan/theme-brutalist.css;
        default_type text/css;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Self-hosted woff2 faces. These are static, licensed files whose bytes never
    # change; the filename IS the version (a new cut would ship under a new name).
    # So cache them a year immutable — same treatment as the ?v=-hashed /.rchan/*
    # assets — instead of the old 7-day non-immutable TTL that made the edge and
    # every browser revalidate all ~16 faces weekly for nothing.
    location = /.rchan/roboto.woff2 {
        alias /etc/nginx/rchan/roboto.woff2;
        default_type font/woff2;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Helvetica Neue LT Std (licensed, self-hosted) — the Brutalist theme's body/heading face.
    location ~ ^/\.rchan/hn-(roman|bold|italic)\.woff2$ {
        alias /etc/nginx/rchan/hn-$1.woff2;
        default_type font/woff2;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Linux Libertine (SIL OFL 1.1, subset TTF->woff2) — the Academia theme's serif.
    location ~ ^/\.rchan/ll-(regular|italic|bold|bolditalic)\.woff2$ {
        alias /etc/nginx/rchan/ll-$1.woff2;
        default_type font/woff2;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # New York (Apple's optical-size serif, subset OTF->woff2) — the Cream theme
    # family: "-small-" = body optical size, "-large-" = display (titles/subjects).
    location ~ ^/\.rchan/ny-(small|large)-(regular|italic|medium|mediumitalic|semibold|bold)\.woff2$ {
        alias /etc/nginx/rchan/ny-$1-$2.woff2;
        default_type font/woff2;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ISO country-code list (generated from the fe's flag PNGs) — feeds the
    # admin flag-override dropdown in ux.js. Purely cosmetic; the server-side
    # whitelist lives in the flagoverride addon.
    location = /.rchan/flags.json {
        alias /etc/nginx/rchan/flags.json;
        default_type application/json;
        add_header Cache-Control "public, max-age=86400";
    }

    # Roboto Mono variable font (self-hosted, latin subset) — file-info monospace.
    location = /.rchan/robotomono.woff2 {
        alias /etc/nginx/rchan/robotomono.woff2;
        default_type font/woff2;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cross-origin storage bridge for the rchan.xyz homepage's "Your threads" strip.
    # localStorage is per-origin, so the apex page can't see the board origin's watched/
    # inbox state directly. This broker (loaded in a hidden iframe FROM this origin, so
    # it can read this origin's localStorage) answers postMessage requests from the apex
    # with a read-only, whitelisted set of keys. Served by nginx (no engine CSP), so its
    # inline script runs; the origin allow-list inside is the security boundary.
    location = /.rchan/bridge.html {
        default_type text/html;
        charset utf-8;
        add_header Cache-Control "public, max-age=300";
        return 200 '<!doctype html><meta charset=utf-8><title>rchan bridge</title><script>(function(){var A=["https://rchan.xyz","https://www.rchan.xyz"],K=["watchedData","rchan_youbox","rchan_you","selectedTheme","rchan_sid"];window.addEventListener("message",function(e){if(A.indexOf(e.origin)<0){return}var d=e.data;if(!d||d.__rchanBridge!==1){return}var out={},req=(d.req&&d.req.length)?d.req:K;req.forEach(function(k){if(K.indexOf(k)>-1){try{out[k]=localStorage.getItem(k)}catch(x){}}});if(e.source){e.source.postMessage({__rchanBridge:1,values:out},e.origin)}})})();</script>';
    }

    # WebSocket for native live thread updates. LynxChan's WS server runs on the
    # container's wsPort (8082, plain ws). Exposed same-origin on 443 as /.ws so it
    # rides the existing Cloudflare + DSM 443 chain; ux.js transparently rewrites the
    # engine's ws://<host>:8082 URL to wss://<host>/.ws. Inherits proxy_http_version 1.1
    # + Upgrade/Connection from the proxy defaults above.
    location = /.ws {
        proxy_pass http://lynxchan:8082;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # PWA: manifest, service worker (scope '/' needs the allow header), app icons.
    location = /manifest.json {
        alias /etc/nginx/rchan/manifest.json;
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=300";
    }
    location = /.rchan/sw.js {
        alias /etc/nginx/rchan/sw.js;
        default_type application/javascript;
        add_header Service-Worker-Allowed "/";
        add_header Cache-Control "no-cache";
    }
    location = /.rchan/icon-192.png { alias /etc/nginx/rchan/icon-192.png; default_type image/png; add_header Cache-Control "public, max-age=86400"; }
    location = /.rchan/icon-512.png { alias /etc/nginx/rchan/icon-512.png; default_type image/png; add_header Cache-Control "public, max-age=86400"; }

    # "Cream" theme CSS (scoped to .theme_cream; selectable via the theme switcher,
    # which themes.js registers). bg #EEEEE4 / text #393939.
    # rchan: lang attribute for a11y (html-has-lang audit). Every page is English.
    sub_filter '<html>' '<html lang="en">';

    # rchan: this used to inject an inline `<script>window.RCHAN_TCSS={...}</script>`
    # — CSP is script-src 'self' with no unsafe-inline/nonce, so the browser
    # silently blocked it every time (Lighthouse errors-in-console: "Refused to
    # execute inline script"), meaning predark.js's Academia/Brutalist preload
    # never actually ran for anyone. Moved the same data onto predark.js's own
    # <script src> tag as data-* attributes instead: attributes aren't script
    # content, so CSP doesn't touch them, and predark.js reads them via
    # document.currentScript.dataset.
    sub_filter '<head>' '<head><script data-tcss-academia="/.rchan/theme-academia.css?v=464d1e80" data-tcss-brutalist="/.rchan/theme-brutalist.css?v=6aa059d6" src="/.rchan/predark.js?v=b17fef2b"></script><style>html.predark{background:#16171b}html.predark body{background:#16171b!important;color:#c9ccd1}html.predark.rchan-warmdark{background:#1F1F1E}html.predark.rchan-warmdark body{background:#1F1F1E!important;color:#E8E6DF}</style><link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#c8102e"><link rel="apple-touch-icon" href="/.rchan/icon-192.png"><link rel="icon" type="image/gif" href="/.static/logo.png"><link rel="stylesheet" href="/.rchan/ux.css?v=cc85442e"><style id="theme-cream">body.theme_cream,.theme_cream{background:#EEEEE4!important;color:#393939!important}.theme_cream a{color:#274a6b}.theme_cream .innerPost,.theme_cream .sideCatalogCell,.theme_cream .markedPost,.theme_cream .sideCatalogMarkedCell,.theme_cream #quick-reply table,.theme_cream .floatingMenu,.theme_cream #newPostFieldset,.theme_cream #postingForm,.theme_cream #postingTable,.theme_cream #postingForm td,.theme_cream .modalTableBody td,.theme_cream .topBoards a,.theme_cream #divLatestPosts .latestPostCell{background:#E6E6DA!important;color:#393939!important;border-color:#CFCFC4!important}.theme_cream #postingForm th,.theme_cream .modalTableBody th{background:#DCDCCF!important;color:#393939!important;border-color:#CFCFC4!important}.theme_cream nav,.theme_cream #dynamicHeader{background:#E6E6DA!important}.theme_cream .labelSubject,.theme_cream .postInfo,.theme_cream .divMessage,.theme_cream .title{color:#393939!important}.theme_cream .linkName,.theme_cream .labelName{color:#3A6B2E!important}</style>';

    # SEO: one canonical spelling per page. $rchan_canon (map, top of file)
    # resolves the homepage to the apex, board indexes to their catalog, and
    # strips .html; every HTML page gets exactly one <link rel="canonical">.
    # Injected engine-side content never carries its own canonical, so there is
    # a single source of truth for it — this line.
    sub_filter '</head>' '<link rel="canonical" href="$rchan_canon"></head>';

    # Cache-bust the patched tooltips.js: /.static/js/* is edge-cached (max-age=3600) by
    # Cloudflare, which ignores browser hard-refreshes, so a changed file can stay stale
    # for up to an hour. A versioned query string is a new cache key = instant rollout.
    # Bump the v= number whenever fe-overrides/tooltips.js changes.
    sub_filter 'src="/.static/js/tooltips.js"' 'src="/.static/js/tooltips.js?v=76e5a8f4"';
    # same cache-bust, for the patched catalog.js (clean-URL api.boardUri fix).
    # Bump the v= number whenever fe-overrides/catalog.js changes.
    sub_filter 'src="/.static/js/catalog.js"' 'src="/.static/js/catalog.js?v=183424cf"';
    # same cache-bust, for the patched themes.js (themeSelector aria-label).
    # Bump the v= number whenever fe-overrides/themes.js changes.
    sub_filter 'src="/.static/js/themes.js"' 'src="/.static/js/themes.js?v=ef68af5f"';

    # CLS: reserve space for the catalog toolbar (search/sort/size/view — built
    # client-side by buildCatalogTools() in 25-catalog.js) BEFORE it exists, so
    # its insertion doesn't shove #divThreads and all 51+ cells down after
    # first paint. This was by far the single largest Lighthouse CLS
    # contributor (~0.3-0.4 of it on its own). 124px matches the bar's actual
    # measured height on the Moto G Power / 412px-wide viewport Lighthouse
    # mobile emulates (it wraps to multiple lines at that width — see
    # #rchan-cattools-slot in ux.css). buildCatalogTools() looks for this slot
    # and repurposes it instead of inserting a fresh node, falling back to the
    # old insert-fresh behavior if it's ever missing.
    # class="catalogDiv" only appears on catalog pages (thread/overboard pages
    # reuse the bare id="divThreads" for unrelated markup) — this match is
    # catalog-only by construction, no path-based routing needed.
    sub_filter '<div id="divThreads" class="catalogDiv">' '<div id="rchan-cattools-slot"></div><div id="divThreads" class="catalogDiv">';

    # strip .html from every link (href/action/etc.)
    sub_filter '.html"'  '"';
    sub_filter ".html'"  "'";
    sub_filter '.html#'  '#';
    sub_filter '.html?'  '?';

    # strip .js ONLY from navigation links (href="..."), leaving form actions alone
    sub_filter 'href="/noCookieCaptcha.js"'  'href="/noCookieCaptcha"';
    sub_filter 'href="/noCookieCaptcha.js?'  'href="/noCookieCaptcha?';
    sub_filter 'href="/openReports.js"'  'href="/openReports"';
    sub_filter 'href="/openReports.js?'  'href="/openReports?';
    sub_filter 'href="/appealedBans.js"'  'href="/appealedBans"';
    sub_filter 'href="/appealedBans.js?'  'href="/appealedBans?';
    sub_filter 'href="/account.js"'  'href="/account"';
    sub_filter 'href="/account.js?'  'href="/account?';
    sub_filter 'href="/trashBin.js"'  'href="/trashBin"';
    sub_filter 'href="/trashBin.js?'  'href="/trashBin?';
    sub_filter 'href="/socketControl.js"'  'href="/socketControl"';
    sub_filter 'href="/socketControl.js?'  'href="/socketControl?';
    sub_filter 'href="/rangeBans.js"'  'href="/rangeBans"';
    sub_filter 'href="/rangeBans.js?'  'href="/rangeBans?';
    sub_filter 'href="/mediaManagement.js"'  'href="/mediaManagement"';
    sub_filter 'href="/mediaManagement.js?'  'href="/mediaManagement?';
    sub_filter 'href="/logs.js"'  'href="/logs"';
    sub_filter 'href="/logs.js?'  'href="/logs?';
    sub_filter 'href="/latestPostings.js"'  'href="/latestPostings"';
    sub_filter 'href="/latestPostings.js?'  'href="/latestPostings?';
    sub_filter 'href="/languages.js"'  'href="/languages"';
    sub_filter 'href="/languages.js?'  'href="/languages?';
    sub_filter 'href="/hashBans.js"'  'href="/hashBans"';
    sub_filter 'href="/hashBans.js?'  'href="/hashBans?';
    sub_filter 'href="/graphs.js"'  'href="/graphs"';
    sub_filter 'href="/graphs.js?'  'href="/graphs?';
    sub_filter 'href="/globalSettings.js"'  'href="/globalSettings"';
    sub_filter 'href="/globalSettings.js?'  'href="/globalSettings?';
    sub_filter 'href="/globalManagement.js"'  'href="/globalManagement"';
    sub_filter 'href="/globalManagement.js?'  'href="/globalManagement?';
    sub_filter 'href="/filterManagement.js"'  'href="/filterManagement"';
    sub_filter 'href="/filterManagement.js?'  'href="/filterManagement?';
    sub_filter 'href="/customThumbs.js"'  'href="/customThumbs"';
    sub_filter 'href="/customThumbs.js?'  'href="/customThumbs?';
    sub_filter 'href="/closedReports.js"'  'href="/closedReports"';
    sub_filter 'href="/closedReports.js?'  'href="/closedReports?';
    sub_filter 'href="/boards.js"'  'href="/boards"';
    sub_filter 'href="/boards.js?'  'href="/boards?';
    sub_filter 'href="/bans.js"'  'href="/bans"';
    sub_filter 'href="/bans.js?'  'href="/bans?';
    sub_filter 'href="/bannerManagement.js"'  'href="/bannerManagement"';
    sub_filter 'href="/bannerManagement.js?'  'href="/bannerManagement?';
    sub_filter 'href="/asnBans.js"'  'href="/asnBans"';
    sub_filter 'href="/asnBans.js?'  'href="/asnBans?';
    sub_filter 'href="/archives.js"'  'href="/archives"';
    sub_filter 'href="/archives.js?'  'href="/archives?';
    sub_filter 'href="/accounts.js"'  'href="/accounts"';
    sub_filter 'href="/accounts.js?'  'href="/accounts?';

    # The header logo is an animated GIF, but the template hard-codes /.static/logo.png.
    # Serve it with the correct image/gif content-type (browsers sniff anyway, but this
    # stops Cloudflare from mis-optimizing a GIF that's labelled as PNG).
    location = /.static/logo.png {
        proxy_pass http://lynxchan:8080;
        proxy_hide_header Content-Type;
        add_header Content-Type image/gif always;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # The overboard is a pseudo-board served only at /overboard/ (trailing slash),
    # but its nav link is bare /overboard — send it to the working path.
    location = /overboard { absolute_redirect off; return 301 /overboard/; }

    # Custom spoiler art: the engine serves its stock grayscale spoiler.png;
    # override the site-wide default at the router (board custom spoilers at
    # /<board>/custom.spoiler are untouched).
    location = /spoiler.png {
        alias /etc/nginx/rchan/spoiler.png;
        default_type image/png;
        add_header Cache-Control "public, max-age=86400";
    }

    # Branded 404 page: every dead URL ends its fallback chain at @rawpath
    # (below), whose `return 404` lands here via the server-wide error_page.
    error_page 404 /.rchan/404.html;
    location = /.rchan/404.html {
        alias /etc/nginx/rchan/404.html;
        default_type text/html;
        add_header Cache-Control "no-store";
    }

    # Offline fallback: precached by the service worker at install and served
    # by it when a navigation can't reach the network (see fe-overrides/sw.js).
    # Short TTL — the SW refetches with cache:"reload" on every install anyway.
    location = /.rchan/offline.html {
        alias /etc/nginx/rchan/offline.html;
        default_type text/html;
        add_header Cache-Control "public, max-age=300";
    }

    # Static content pages (about, rules, posting help…) are real .html files under
    # /.static/pages/. sub_filter strips .html from their links, and the main rewrite
    # below skips dot-prefixed paths — so restore the extension for these specifically.
    location ~ ^/\.static/pages/[^./]+$ {
        rewrite ^(.*)$ $1.html break;
        proxy_pass http://lynxchan:8080;
    }

    # Board banner static files (/<board>/banners/<id>, uploaded via admin panel).
    # No extension and no trailing slash, so without this they fall into the
    # clean-URL rewriter below: it tries <id>.html (404), then <id>.js (404), then
    # gives up and redirects to <id>/ (also a dead end) -> banner shows broken.
    # These are real files the engine serves as-is; proxy straight through.
    location ~ "^/[^/]+/banners/" {
        proxy_pass http://lynxchan:8080;
    }

    # Default a board's landing view to its CATALOG instead of the threaded index.
    # A board index arrives as a single-segment trailing-slash path (e.g. /rdr/); send it
    # to /<board>/catalog (clean URL -> catalog.html via the rewrite below). 302 (not 301)
    # so it's not hard-cached and stays trivially reversible. `overboard` is excluded — it
    # has no catalog page. Deeper paths (/rdr/2, /rdr/res/…, /rdr/catalog) don't match.
    # Any query string (e.g. /rdr/?index — used by the ux.js list/catalog toggle) opts OUT
    # of the redirect and serves the threaded index straight from the engine.
    # …unless the user opted for the threaded index: the ux.js list/catalog
    # toggle persists the choice in an rchan_view cookie, which switches the
    # board landing view for them site-wide.
    location ~ "^/(?!overboard/)[^/.]+/$" {
        absolute_redirect off;
        set $go_catalog 0;
        if ($args = "") { set $go_catalog 1; }
        if ($cookie_rchan_view = "index") { set $go_catalog 0; }
        if ($go_catalog) { return 302 "${uri}catalog"; }
        proxy_pass http://lynxchan:8080;
    }

    # SECURITY: session/role-dependent JSON endpoints must NEVER be cached at
    # the Cloudflare edge. The engine sends "Cache-Control: no-cache" on these,
    # but Cloudflare's default extension-based caching for .js URLs ignores
    # that (confirmed live: it was serving a cached response with
    # cf-cache-status HIT / max-age=14400, completely ignoring the origin's
    # no-cache) and caches by URL ONLY -- it does not vary the cache key by
    # session cookie. Whichever request happens to be the first cache MISS in
    # a ~4h window "wins" and gets replayed to every other visitor for the
    # rest of that window, regardless of THEIR OWN login state. Concretely:
    # a staff member's /account.js response (globalRole present) got cached
    # and served back to an anonymous/non-staff visitor, whose page then
    # incorrectly flipped on body.rchan-staff and unlocked the quick-mod
    # delete/ban-any-post controls (65-thread-tools.js decorateQuickMod) for
    # someone with no actual staff session -- and the same hole applies to
    # /openReports.js (real moderation report data, not just a role flag).
    # "no-store" (not "no-cache") is required: presence.js's endpoint already
    # sends no-store and Cloudflare correctly bypasses cache for it (verified
    # cf-cache-status: DYNAMIC), confirming no-store is what Cloudflare
    # actually honors here.
    location = /account.js {
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_pass http://lynxchan:8080;
    }
    location = /openReports.js {
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_pass http://lynxchan:8080;
    }
    # Same fix, generalized: the $rchan_noindex map above (lines 69-97) lists
    # ~20 MORE session/role-gated .js endpoints with the identical shape as
    # account.js/openReports.js above (staff-only report/ban/settings/log
    # data, gated purely by cookie session — nothing in the URL itself
    # varies), and every one of them was still falling through to the
    # generic `location /` below, which never overrides Cache-Control. Any
    # one of these could be the next /account.js-style incident. Excluded
    # deliberately: /login, /noCookieCaptcha, /captcha — those are
    # anonymous/pre-auth (no session-specific data to leak via a shared
    # cache); they already get X-Robots-Tag from the map for SEO but don't
    # need this Cache-Control override.
    location ~ ^/(accounts|closedReports|globalManagement|globalSettings|bans|bannerManagement|rangeBans|hashBans|asnBans|appealedBans|filterManagement|mediaManagement|customThumbs|trashBin|archives|latestPostings|logs|graphs|languages|socketControl)\.js$ {
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_pass http://lynxchan:8080;
    }

    # SEO: exactly one URL spelling per page. The clean-URL layer strips .html
    # from every LINK (sub_filter above), but a direct .html request still
    # served 200 — the same document reachable at two URLs. Now the .html
    # spelling 301s to the clean one, matching what the canonical tag already
    # declares. Requests that must keep .html are protected structurally:
    # bridge.html and 404.html are exact-match locations (beat any regex), the
    # engine-internal .html rewrites in `location /`/@try_js never re-enter
    # location matching (rewrite…break / proxy_pass with URI stay in-location),
    # and /.static/pages/<x>.html just 301s to the extensionless form its own
    # location already resolves. Query strings survive the hop.
    location ~ ^(?<rchan_clean>.+)\.html$ {
        absolute_redirect off;
        return 301 $rchan_clean$is_args$args;
    }
    # …and the front page's own alias goes home rather than to a bare /index.
    location = /index.html { absolute_redirect off; return 301 /; }

    # Content-addressed media (/.media/<sha>.<ext> full files, and thumbnails
    # /.media/t_<sha>?v=<thumbAssetVersion>). The SHA-256 content hash is IN the
    # path, so a given URL's bytes never change — the textbook case for hard edge
    # caching, and the single biggest bandwidth lever on the site: every catalog
    # and thread view otherwise re-pulls thumbnails out of GridFS, and the
    # extensionless thumb URLs aren't caught by Cloudflare's default extension-
    # based cache at all (they read as dynamic and hit the origin every time).
    # The engine sends only "max-age=86400, must-revalidate"; override to a long
    # immutable TTL so Cloudflare (and browsers) stop revalidating.
    #
    # TRADEOFF — deletion propagation: a cached object outlives its origin file
    # until the TTL expires. Content is content-addressed so a re-upload is a new
    # URL, but a TAKEDOWN (illegal content, DMCA) must be followed by a Cloudflare
    # cache purge of that URL (dashboard/API) — the 30-day max-age bounds the
    # worst case if a purge is missed. This mirrors how every large imageboard
    # runs its media edge: cache hard, purge on removal.
    #
    # HOTLINK PROTECTION: media is a bandwidth cost only WE should pay. Allow a
    # missing/blocked Referer (direct image-open, downloads, the PWA service
    # worker, bookmarks) and our own hosts; reject foreign embeds with 403. This
    # is origin-side defence-in-depth — once Cloudflare caches an object it serves
    # it without consulting the origin, so the complete answer is Cloudflare's own
    # Hotlink Protection / a Referer WAF rule; this still guards every cache MISS
    # and any direct-to-origin access.
    # SAFETY: the Cache-Control below is deliberately NOT "always", so it attaches
    # only to the success codes (200/206) — never to the 403. A 403 is not a
    # Cloudflare-default-cacheable status AND carries no cache header, so a
    # hotlinker's rejection can never be cached and replayed to a legit viewer
    # (the same cache-key hazard the account.js fix addressed).
    location ^~ /.media/ {
        # nginx matches valid_referers regexes against the Referer with the
        # scheme (http://|https://) already stripped — so match the host only.
        valid_referers none blocked server_names
                       ~^([a-z0-9-]+\.)?rchan\.xyz(/|$|:);
        if ($invalid_referer) { return 403; }
        proxy_pass http://lynxchan:8080;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Hot polled read-only JSON: per-board catalog.json and per-thread res/<id>.json.
    # These are the single most-requested dynamic endpoints on the site — the native
    # catalog auto-refresh, the board-liveness pill (60s/tab), and the unread watcher
    # sweep (75s × every watched board, per user) all poll them, and the engine marks
    # them "no-cache" so Cloudflare treats every poll as DYNAMIC and streams a fresh
    # Mongo read to the origin. They are anonymous public content with no per-session
    # variance, so a few seconds of shared-cache life is invisible (live post arrivals
    # still come over the WebSocket) and collapses N concurrent pollers to ~1 origin
    # hit per edge colo per window.
    #   max-age=0    -> browsers keep revalidating (behaves like today for the user)
    #   s-maxage=15  -> Cloudflare/shared caches may hold it 15s
    # NOTE: this is the ORIGIN half. Cloudflare does not cache .json by default
    # extension, so it needs a companion Cache Rule (dashboard) matching these paths
    # with "Eligible for cache" + "Respect origin TTL". Without the rule this header
    # is simply a harmless no-op (browsers still revalidate) — never a correctness risk.
    # 'always' is deliberately omitted on Cache-Control so a proxied 4xx/5xx (which
    # carries no success body worth sharing) can't be edge-cached and replayed.
    location ~ ^/[^/.]+/(catalog\.json|res/[0-9]+\.json)$ {
        add_header Access-Control-Allow-Origin $rchan_cors always;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=0, s-maxage=15";
        add_header X-Content-Type-Options "nosniff" always;
        # SEO: machine mirrors of the HTML pages — keep them out of the index
        add_header X-Robots-Tag "noindex" always;
        proxy_pass http://lynxchan:8080;
    }

    location / {
        # Preload hints for the two render-blocking injected assets (ux.css
        # stylesheet + predark.js head script): browsers start fetching them
        # from the response HEADERS, before the HTML body parses far enough
        # to discover the injected tags — and if Cloudflare's Early Hints is
        # on, the edge replays these as a 103 before the origin even answers.
        # The ?v= tokens are rewritten by deploy-fe.sh like every other
        # occurrence in this file, so the hint never points at a stale URL.
        # HTML-serving location only: media/assets/JSON have their own
        # add_header sets and never inherit this.
        add_header Link "</.rchan/ux.css?v=cc85442e>; rel=preload; as=style, </.rchan/predark.js?v=b17fef2b>; rel=preload; as=script" always;
        # public-JSON CORS for the rchan.xyz homepage strips (empty on every
        # other path, so the header is simply not added there)
        add_header Access-Control-Allow-Origin $rchan_cors always;
        # SEO: noindex map for utility/mod/captcha surfaces (empty = omitted).
        # NOTE $uri here is the REWRITTEN uri (/login -> /login.html), which the
        # map's regexes deliberately accommodate.
        add_header X-Robots-Tag $rchan_noindex always;
        # The engine's own CSP is script-src 'self' with no unsafe-inline/nonce
        # support, which silently killed the ONE inline script we intentionally
        # emit (25-catalog.js's initSpeculation(): a static, never-changing
        # <script type="speculationrules"> — moving it external hit "External
        # speculation rules are not yet supported" in current Chrome, so inline
        # is the only working form). A sha256 hash source allows exactly that
        # one script's exact bytes and nothing else — keep the hash and the
        # script's textContent in initSpeculation() byte-for-byte in sync, or
        # this silently starts blocking it again.
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "script-src 'self' 'sha256-gsLxIRD8x8J8mPf+2bGc1vas2Ej+j13t4o+nJFQEm+0='" always;
        # extension-less page URL -> try /<x>.html first
        proxy_intercept_errors on;
        error_page 404 = @try_js;
        rewrite ^/([^.]+[^/])$ /$1.html break;
        proxy_pass http://lynxchan:8080;
    }

    # .html missed -> try /<x>.js (the dynamic page endpoints: boards, logs, ...)
    location @try_js {
        internal;
        add_header X-Robots-Tag $rchan_noindex always;   # same guard on the .js hop
        proxy_intercept_errors on;
        error_page 404 = @rawpath;
        rewrite ^/(.*)\.html$ /$1.js break;
        proxy_pass http://lynxchan:8080;
    }

    # .js missed too -> it's a bare board/pseudo-board index (e.g. /rdr, /overboard).
    # The engine serves those only at a trailing slash, so redirect there. (Pages like
    # /boards already resolved at the .js step and never reach here.) Anything that
    # doesn't fit that shape is genuinely dead: 404 -> the branded page above.
    location @rawpath {
        internal;
        absolute_redirect off;
        rewrite ^/(.*)\.js$ /$1/ redirect;
        return 404;
    }
}
