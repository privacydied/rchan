# rchan — LynxChan imageboard stack
# Fronted by DSM's built-in reverse proxy + Certificate manager (TLS terminates there).
# Host ports are bound to 127.0.0.1 ONLY: nothing is exposed to the LAN, so the
# engine's trustedProxies:["*"] stays safe (only the local reverse proxy can reach it).
services:
  mongo:
    image: mongo:4.4
    container_name: rchan-mongo
    restart: unless-stopped
    command: ["--wiredTigerCacheSizeGB", "1"]
    # Ceiling only — a runaway backstop, not a working set. Normal use sits far
    # below this (1 GB WiredTiger cache + connection/index overhead). Sized for
    # a 6–8 GB NAS; raise before lowering if you ever see OOM-kills in dmesg.
    mem_limit: 2g
    volumes:
      - ./mongo-data:/data/db
    networks:
      - rchan-internal

  lynxchan:
    build:
      context: .
      dockerfile: Dockerfile
    image: rchan-lynxchan:local
    container_name: rchan-lynxchan
    restart: unless-stopped
    # Ceiling for the Node engine — well above steady state, but leaves room for
    # thumbnail generation spikes (sharp/ffmpeg) on multi-file uploads.
    mem_limit: 1500m
    depends_on:
      - mongo
    env_file: .env
    environment:
      DB_HOST: mongo
      DB_PORT: "27017"
      NODE_ENV: production
      # fallback module path for host-mounted addon deps (geoip-lite)
      NODE_PATH: /lynxchan/addon-deps
    volumes:
      - ./settings:/lynxchan/src/be/settings
      - ./state:/lynxchan/state
      # Per-thread / per-board Open Graph tags (modified copy of PenumbraLynx static.js).
      - ./fe-overrides/be/static.js:/lynxchan/src/be/engine/domManipulator/static.js:ro
      - ./fe-overrides/be/engine/gridFsHandler.js:/lynxchan/src/be/engine/gridFsHandler.js:ro
      - ./fe-overrides/be/engine/domManipulator-common.js:/lynxchan/src/be/engine/domManipulator/common.js:ro
      - ./fe-overrides/be/engine/jsonBuilder.js:/lynxchan/src/be/engine/jsonBuilder.js:ro
      # Custom site logo — replace ./branding/logo.png to rebrand (served at /.static/logo.png)
      - ./branding/logo.png:/lynxchan/src/fe/static/logo.png:ro
      # Customized front-page template (infoBox title text). Copy of PenumbraLynx's
      # index.html — re-copy from the image if the upstream template changes.
      - ./fe-overrides/index.html:/lynxchan/src/fe/templates/pages/index.html:ro
      # Adds the "Cream" theme to the theme switcher (copy of PenumbraLynx themes.js).
      - ./fe-overrides/themes.js:/lynxchan/src/fe/static/js/themes.js:ro
      # Quote hover-preview fix (copy of PenumbraLynx tooltips.js): its board/thread/post
      # regex required ".html" in quote hrefs, which the router's clean-URL sub_filter
      # strips — made optional so hover previews + backlinks work on clean URLs.
      - ./fe-overrides/tooltips.js:/lynxchan/src/fe/static/js/tooltips.js:ro
      # Same clean-URL fix as tooltips.js, applied to catalog.js: initCatalog()'s
      # api.boardUri regex required a literal ".html" and threw (breaking the
      # rest of init) on our extensionless /<board>/catalog URLs.
      - ./fe-overrides/catalog.js:/lynxchan/src/fe/static/js/catalog.js:ro
      # Site-wide global rules page (copy of PenumbraLynx globalRules.html).
      - ./fe-overrides/globalRules.html:/lynxchan/src/fe/static/pages/globalRules.html:ro
      # Captcha-gated contact page (reveals admin@rchan.xyz after solving a captcha).
      - ./fe-overrides/contact.html:/lynxchan/src/fe/static/pages/contact.html:ro
      # geoflags addon: country flags next to the name (geoip-lite), enabled via addons + locationFlagMode
      - ./fe-overrides/addons/geoflags.js:/lynxchan/src/be/addons/geoflags.js:ro
      # geoip-lite + deps for the geoflags addon, installed on the HOST (pure JS + data,
      # arch-independent). Mounted at a side path and resolved via NODE_PATH because the
      # running image predates the Dockerfile's geoip-lite layer — a `docker exec npm
      # install` doesn't survive container recreation (flags silently died that way once).
      - ./addons-deps/node_modules:/lynxchan/addon-deps:ro
      - ./fe-overrides/addons/fixvideothumbs.js:/lynxchan/src/be/addons/fixvideothumbs.js:ro
      # flagoverride addon: admin-only manual flag on posts (server-side role gate;
      # threshold via flagOverrideMinRole in settings/general.json, default 1)
      - ./fe-overrides/addons/flagoverride.js:/lynxchan/src/be/addons/flagoverride.js:ro
      # presence addon: anonymous per-thread viewer counts ("N anons here") via
      # heartbeat pings into its own TTL'd rchanPresence collection
      - ./fe-overrides/addons/presence.js:/lynxchan/src/be/addons/presence.js:ro
      # webpush addon: server-sent reply notifications that work with the tab
      # closed (Web Push). Own rchanPushSubs collection; READS posts to decide
      # what to notify, never writes engine data. Needs VAPID_* in .env.
      - ./fe-overrides/addons/webpush.js:/lynxchan/src/be/addons/webpush.js:ro
      # sitemap addon: live XML sitemap at /addon.js/sitemap (router serves it
      # as /sitemap.xml). Read-only (boards+threads projections), 10-min cache.
      - ./fe-overrides/addons/sitemap.js:/lynxchan/src/be/addons/sitemap.js:ro
    # No published host port: the engine is reached only via the internal network
    # (rchan-internal) by the router below, as http://lynxchan:8080.
    networks:
      - rchan-internal

  # Front router: the ONLY host-exposed port. DSM points every hostname here on
  # 8081; this nginx splits by Host (rchan.xyz = landing, boards.rchan.xyz = engine),
  # so DSM never needs per-subdomain backend ports.
  landing:
    image: nginx:alpine
    container_name: rchan-landing
    restart: unless-stopped
    # nginx is tiny; this is pure headroom for sub_filter response buffering.
    mem_limit: 512m
    depends_on:
      - lynxchan
    volumes:
      - /volume1/web/rchan:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./fe-overrides/mod.js:/etc/nginx/rchan/mod.js:ro
      - ./fe-overrides/favicon.js:/etc/nginx/rchan/favicon.js:ro
      - ./fe-overrides/predark.js:/etc/nginx/rchan/predark.js:ro
      - ./fe-overrides/ux.css:/etc/nginx/rchan/ux.css:ro
      # per-theme CSS layers (split out of ux.css; loaded only on their theme)
      - ./fe-overrides/theme-academia.css:/etc/nginx/rchan/theme-academia.css:ro
      - ./fe-overrides/theme-brutalist.css:/etc/nginx/rchan/theme-brutalist.css:ro
      - ./fe-overrides/Roboto.woff2:/etc/nginx/rchan/roboto.woff2:ro
      - ./fe-overrides/RobotoMono.woff2:/etc/nginx/rchan/robotomono.woff2:ro
      # Helvetica Neue LT Std (licensed, converted OTF->woff2) — the Brutalist theme
      - ./fe-overrides/hn-roman.woff2:/etc/nginx/rchan/hn-roman.woff2:ro
      - ./fe-overrides/hn-bold.woff2:/etc/nginx/rchan/hn-bold.woff2:ro
      - ./fe-overrides/hn-italic.woff2:/etc/nginx/rchan/hn-italic.woff2:ro
      # Linux Libertine (SIL OFL 1.1, subset OTF->woff2) — the Academia theme's serif
      - ./fe-overrides/ll-regular.woff2:/etc/nginx/rchan/ll-regular.woff2:ro
      - ./fe-overrides/ll-italic.woff2:/etc/nginx/rchan/ll-italic.woff2:ro
      - ./fe-overrides/ll-bold.woff2:/etc/nginx/rchan/ll-bold.woff2:ro
      - ./fe-overrides/ll-bolditalic.woff2:/etc/nginx/rchan/ll-bolditalic.woff2:ro
      - ./fe-overrides/ny-small-regular.woff2:/etc/nginx/rchan/ny-small-regular.woff2:ro
      - ./fe-overrides/ny-small-italic.woff2:/etc/nginx/rchan/ny-small-italic.woff2:ro
      - ./fe-overrides/ny-small-medium.woff2:/etc/nginx/rchan/ny-small-medium.woff2:ro
      - ./fe-overrides/ny-small-mediumitalic.woff2:/etc/nginx/rchan/ny-small-mediumitalic.woff2:ro
      - ./fe-overrides/ny-small-semibold.woff2:/etc/nginx/rchan/ny-small-semibold.woff2:ro
      - ./fe-overrides/ny-large-semibold.woff2:/etc/nginx/rchan/ny-large-semibold.woff2:ro
      - ./fe-overrides/ny-large-bold.woff2:/etc/nginx/rchan/ny-large-bold.woff2:ro
      - ./fe-overrides/flags.json:/etc/nginx/rchan/flags.json:ro
      - ./fe-overrides/ux.js:/etc/nginx/rchan/ux.js:ro
      - ./fe-overrides/manifest.json:/etc/nginx/rchan/manifest.json:ro
      - ./fe-overrides/sw.js:/etc/nginx/rchan/sw.js:ro
      # branded 404 page (router-served for every dead URL) + custom spoiler art
      - ./fe-overrides/404.html:/etc/nginx/rchan/404.html:ro
      # offline fallback page (precached + served by the service worker)
      - ./fe-overrides/offline.html:/etc/nginx/rchan/offline.html:ro
      - ./fe-overrides/spoiler.png:/etc/nginx/rchan/spoiler.png:ro
      - ./branding/icon-192.png:/etc/nginx/rchan/icon-192.png:ro
      - ./branding/icon-512.png:/etc/nginx/rchan/icon-512.png:ro
    ports:
      - "127.0.0.1:8081:80"     # rchan.xyz + boards.rchan.xyz -> DSM -> here
    networks:
      - rchan-internal

  # Nightly mongodump of the imageboard DB to Dropbox (off-box), keeping the last 14.
  # Runs one backup immediately on start (a post-deploy safety net), then once a day
  # anchored to 04:00 local. The dump reads the ENTIRE media corpus out of Mongo and
  # gzips it — a real I/O+CPU spike that also evicts the hot thumbnail set from Mongo's
  # 1 GB WiredTiger cache — so it must land at the quietest hour, NOT at whatever
  # arbitrary time the stack was last restarted (the old flat `sleep 86400` pinned the
  # run to the restart minute). TZ makes "04:00" mean 04:00 Europe/London, not UTC.
  # Restore:  sudo docker exec -i rchan-mongo mongorestore --gzip --archive --drop < rchan-YYYYMMDD-HHMMSS.archive.gz
  backup:
    image: mongo:4.4
    container_name: rchan-backup
    restart: unless-stopped
    # mongodump streams; it doesn't buffer the whole DB. This ceiling only
    # bounds the nightly spike so it can't starve mongo/lynxchan of host RAM.
    mem_limit: 512m
    depends_on:
      - mongo
    environment:
      TZ: Europe/London
    networks:
      - rchan-internal
    volumes:
      - /volume1/cloud/Dropbox/rchan-backups:/backups
    entrypoint:
      - bash
      - -c
      - |
        until mongo --host mongo --quiet --eval "db.version()" >/dev/null 2>&1; do
          echo "[backup] waiting for mongo..."; sleep 3;
        done
        while true; do
          ts=$$(date +%Y%m%d-%H%M%S)
          if mongodump --host mongo --db lynxchan --gzip --archive="/backups/rchan-$$ts.archive.gz"; then
            echo "[backup] ok $$ts ($$(du -h /backups/rchan-$$ts.archive.gz | cut -f1))"
          else
            echo "[backup] FAILED $$ts"; rm -f "/backups/rchan-$$ts.archive.gz"
          fi
          ls -1t /backups/rchan-*.archive.gz 2>/dev/null | tail -n +15 | xargs -r rm -f
          # sleep until the next 04:00 local (today's if still ahead, else tomorrow's)
          now=$$(date +%s)
          target=$$(date -d "today 04:00" +%s)
          [ "$$target" -le "$$now" ] && target=$$(date -d "tomorrow 04:00" +%s)
          echo "[backup] next run at $$(date -d "@$$target")"
          sleep $$(( target - now ))
        done

networks:
  rchan-internal:
    driver: bridge
